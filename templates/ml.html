<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Titanic 機器學習訓練</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: blue;
        }

        button {
            padding: 10px 18px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            max-width: 700px;
            background-color: #fafafa;
        }

        .status {
            font-weight: bold;
            margin-top: 15px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .loading {
            color: #cc7a00;
        }

        table {
            border-collapse: collapse;
            margin-top: 15px;
            width: 100%;
            max-width: 700px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        ul {
            margin-top: 8px;
        }

        code {
            background-color: #eee;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Titanic 機器學習訓練</h1>

    <h2>目前模型狀態</h2>

    <div id="modelStatusBox">
        讀取中...
    </div>

    <a href="/">回首頁</a>

    <hr>

    <div class="card">
        <h2>一鍵訓練模型</h2>

        <p>
            按下按鈕後，後端會從 SQLite 的 <code>titanic</code> 資料表讀取資料，
            並訓練一個 Titanic 生存預測模型。
        </p>

        <label>樹的數量 n_estimators</label>
        <input id="nEstimatorsInput" type="number" value="100" min="10">

        <label>最大深度 max_depth</label>
        <input id="maxDepthInput" type="number" value="5" min="1">

        <label>最小切分數 min_samples_split</label>
        <input id="minSamplesSplitInput" type="number" value="2" min="2">

        <label>測試資料比例 test_size</label>
        <input id="testSizeInput" type="number" value="0.2" min="0.1" max="0.5" step="0.05">

        <label>random_state</label>
        <input id="randomStateInput" type="number" value="42">

        <button id="trainButton">開始訓練模型</button>

        <p id="statusText" class="status">尚未訓練</p>
    </div>

    <div class="card">
        <h2>訓練結果</h2>

        <div id="resultArea">
            尚無結果
        </div>
    </div>

    <script>
        async function loadModelStatus() {
            const statusBox = document.getElementById("modelStatusBox");

            const response = await fetch("/api/ml/status");

            if (!response.ok) {
                statusBox.textContent = "模型狀態讀取失敗";
                return;
            }

            const result = await response.json();

            if (result.trained === true) {
                statusBox.innerHTML = `
                <p>目前狀態：模型已訓練完成</p>
                <p>Accuracy：${result.accuracy ?? "未提供"}</p>
                <p>最佳參數：${JSON.stringify(result.best_params ?? {})}</p>
            `;
            } else {
                statusBox.innerHTML = `
                <p>目前狀態：尚未訓練模型</p>
            `;
            }
        }

        loadModelStatus();

        // 取得 HTML 元素
        const trainButton = document.getElementById("trainButton");
        const statusText = document.getElementById("statusText");
        const resultArea = document.getElementById("resultArea");

        // 監聽「開始訓練模型」按鈕
        trainButton.addEventListener("click", async function () {
            // 按下後，先更新畫面狀態
            trainButton.disabled = true;
            statusText.textContent = "模型訓練中，請稍候...";
            statusText.className = "status loading";
            resultArea.innerHTML = "訓練中...";

            try {
                // POST JSON 給後端
                const trainParams = {
                    n_estimators: Number(document.getElementById("nEstimatorsInput").value),
                    max_depth: Number(document.getElementById("maxDepthInput").value),
                    min_samples_split: Number(document.getElementById("minSamplesSplitInput").value),
                    test_size: Number(document.getElementById("testSizeInput").value),
                    random_state: Number(document.getElementById("randomStateInput").value)
                };

                console.log("送到後端的訓練參數：", trainParams);

                const response = await fetch("/api/ml/train", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(trainParams)
                });

                // 把後端回傳的 JSON 轉成 JavaScript 物件
                const data = await response.json();

                // 在 Console 印出來，方便除錯
                console.log(data);

                // 如果後端回傳錯誤
                if (!response.ok) {
                    statusText.textContent = "訓練失敗";
                    statusText.className = "status error";

                    resultArea.innerHTML = `
                        <p class="error">錯誤訊息：${data.error || "未知錯誤"}</p>
                    `;

                    return;
                }

                /*
                    這行是為了兼容兩種後端格式：

                    格式 1：
                    {
                        result: {
                            accuracy: 0.8
                        }
                    }

                    格式 2：
                    {
                        accuracy: 0.8
                    }

                    你的目前格式是格式 2。
                */
                const result = data.result || data;

                // 後端實際回傳的是 rows / train_size / test_size
                // 不是 total_samples / train_samples / test_samples
                statusText.textContent = "模型訓練完成";
                statusText.className = "status success";

                // 訓練完成後，重新讀取模型狀態
                loadModelStatus();

                // 避免 features 不存在時報錯
                const features = result.features || [];

                // 取得後端回傳的本次訓練參數
                const bestParams = result.best_params || {};

                resultArea.innerHTML = `
                <table>
                    <tr>
                        <th>項目</th>
                        <th>結果</th>
                    </tr>
                    <tr>
                        <td>訊息</td>
                        <td>${result.message}</td>
                    </tr>
                    <tr>
                        <td>模型</td>
                        <td>${result.model}</td>
                    </tr>
                    <tr>
                        <td>總資料筆數</td>
                        <td>${result.rows}</td>
                    </tr>
                    <tr>
                        <td>訓練資料筆數</td>
                        <td>${result.train_size}</td>
                    </tr>
                    <tr>
                        <td>測試資料筆數</td>
                        <td>${result.test_size}</td>
                    </tr>
                    <tr>
                        <td>本次 Accuracy</td>
                        <td>${result.new_accuracy ?? result.accuracy ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>舊模型 Accuracy</td>
                        <td>${result.old_accuracy ?? "目前沒有舊模型"}</td>
                    </tr>
                    <tr>
                        <td>是否比舊模型更好</td>
                        <td>${result.is_better_model === true ? "是" : "否"}</td>
                    </tr>
                    <tr>
                        <td>是否取代目前模型</td>
                        <td>
                            ${result.model_updated === true
                        ? "已取代目前模型"
                        : "未取代，目前仍保留舊模型"
                    }
                        </td>
                    </tr>
                    <tr>
                        <td>比較結果</td>
                        <td>${result.compare_message ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>更新結果</td>
                        <td>${result.update_message ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>n_estimators</td>
                        <td>${bestParams.n_estimators ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>max_depth</td>
                        <td>${bestParams.max_depth ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>min_samples_split</td>
                        <td>${bestParams.min_samples_split ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>test_size</td>
                        <td>${bestParams.test_size ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>random_state</td>
                        <td>${bestParams.random_state ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>訓練時間</td>
                        <td>${result.trained_at ?? "未提供"}</td>
                    </tr>
                    <tr>
                        <td>模型儲存位置</td>
                        <td>${result.model_path || "尚未提供"}</td>
                    </tr>
                </table>

                <h3>使用的特徵欄位</h3>

                <ul>
                    ${features.map(feature => `<li>${feature}</li>`).join("")}
                </ul>
            `;

            } catch (error) {
                // 例如 API 路徑錯誤、Flask 沒開、JSON 格式錯誤等
                statusText.textContent = "訓練失敗";
                statusText.className = "status error";

                resultArea.innerHTML = `
                    <p class="error">發生錯誤：${error.message}</p>
                `;

            } finally {
                // 不管成功或失敗，都讓按鈕恢復可點擊
                trainButton.disabled = false;
            }
        });
    </script>
</body>

</html>
